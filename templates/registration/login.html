{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <h2 class="text-center fw-bold mb-4">Logowanie</h2>
                    
                    <form method="post">
                        {% csrf_token %}
                        {{ form|crispy }}
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3 shadow-sm">
                            Zaloguj się
                        </button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="small text-muted">Nie masz konta? <a href="{% url 'register' %}" class="text-decoration-none">Zarejestruj się</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
